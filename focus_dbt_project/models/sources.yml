            data_type: VARCHAR
          - name: BillingCurrency
            data_type: VARCHAR
          - name: BillingPeriodStart
            data_type: TIMESTAMP
          - name: BillingPeriodEnd
            data_type: TIMESTAMP
          - name: ChargeCategory
