version: 2

sources:
  - name: raw_provider_data
    database: focus
    schema: main
    description: "Raw provider billing data files ingested via DuckDB native readers"
    freshness:
      warn_after:
        count: 24
        period: hour
    loaded_at_field: _loaded_at
    tables:
      - name: cost_and_usage
        description: "Raw cost and usage data (CSV/Parquet/JSON from any provider)"
        external:
          location: "{{ var('cau_csv_path', 'data/cost_and_usage.csv') }}"
          options:
            format: "{{ var('cau_format', 'csv') }}"
            skip_rows: 0
        columns:
          - name: _raw_content
            data_type: VARCHAR
            description: "Raw file contents - use staging models to parse"

      - name: billing_period
        description: "Raw billing period data (CSV/Parquet/JSON)"
        external:
          location: "{{ var('bip_csv_path', 'data/billing_period.csv') }}"
          options:
            format: "{{ var('bip_format', 'csv') }}"
        columns:
          - name: _raw_content
            data_type: VARCHAR

      - name: contract_commitment
        description: "Raw contract commitment data (CSV/Parquet/JSON)"
        external:
          location: "{{ var('cct_csv_path', 'data/contract_commitment.csv') }}"
          options:
            format: "{{ var('cct_format', 'csv') }}"
        columns:
          - name: _raw_content
            data_type: VARCHAR

      - name: invoice_detail
        description: "Raw invoice detail data (CSV/Parquet/JSON)"
        external:
          location: "{{ var('ind_csv_path', 'data/invoice_detail.csv') }}"
          options:
            format: "{{ var('ind_format', 'csv') }}"
        columns:
          - name: _raw_content
            data_type: VARCHAR

  - name: focus_datasets
    database: focus
    schema: main
    description: "Canonical FOCUS 1.4 output datasets"
    tables:
      - name: CostAndUsage
        description: "FOCUS CostAndUsage dataset - cost and usage rows"
